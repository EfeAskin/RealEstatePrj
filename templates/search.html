<!DOCTYPE html>
<html>
<head>
    <title>Search Properties</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.2">
</head>
<body>

<div class="navbar">
    <div style="font-size: 1.2rem;"><b>CypInvEst</b></div>
    <div class="nav-links">
        <a href="/home">Home</a>
        <a href="/search" class="active">Search</a>
        <a href="#">AI Chat</a>
        <a href="/about">About</a>
    </div>
    <div class="right-menu">
        <div class="profile" style="position: relative;">
            <button class="btn-blue">Profile</button>
            <div class="dropdown">
                <a href="#">Personal Info</a>
                <a href="#">My Reservation</a>
                <a href="#">Favorites</a>
                <a href="#">Messages</a>
            </div>
        </div>
        <a href="/" class="exit-icon" style="text-decoration: none; color: #64748b;">🚪</a>
    </div>
</div>

<div class="hero" style="padding: 40px;">
    <h2>Featured Properties</h2>
    <p style="color: #64748b;">Hand-picked properties for you in TRNC</p>
    <div class="search-box">
        <input type="text" placeholder="Type here...">
        <button>Search</button>
    </div>
</div>

<div style="margin: 0 50px 20px 50px; display: flex; gap: 10px;">
    <button class="btn" style="background: white; border: 1px solid #ddd;">Filters</button>
    <button class="btn" style="background: white; border: 1px solid #ddd;">Sort By</button>
</div>

<div class="grid">
    {% for i in range(6) %}
    <div class="card">
        <img src="https://images.unsplash.com/photo-1564013799919-ab600027ffc6">
        <div class="card-content">
            <h3>Villa - Fethiye</h3>
            <p>35.083$ <span style="font-size: 0.8rem; color: #64748b;">/ 2 nights</span></p>
        </div>
    </div>
    {% endfor %}
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const profileBtn = document.querySelector('.btn-blue');
        const dropdown = document.querySelector('.dropdown');

        if (profileBtn && dropdown) {
            profileBtn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                // Menü kapalıysa aç, açıksa kapat
                dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
            };

            document.onclick = function() {
                dropdown.style.display = 'none';
            };

            dropdown.onclick = function(e) {
                e.stopPropagation();
            };
        }
    });
</script>
</body>
</html>
