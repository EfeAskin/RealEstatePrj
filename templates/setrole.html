<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - CypInvEst</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='htmlfotos/favicon.png') }}">
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800;900&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        
        /* Arka Plan */
        .glass-container {
            height: 100vh; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url("/static/htmlfotos/loginspage.png") no-repeat center center fixed;
            background-size: cover;
        }

        /* Premium Karşılama Kutusu */
        .glass-box {
            width: 850px; /* Başlık büyük olduğu için genişliği artırdık */
            min-height: 500px; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; 
            
            /* Mavi Işıltılı Dev Gölge */
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.25), 
                        0 20px 50px rgba(0,0,0,0.3);
            
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 60px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Arka Plandaki Hafif Altın Işıltı */
        .glass-box::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 163, 115, 0.05) 0%, rgba(255,255,255,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Dev Karşılama Başlığı */
        .welcome-title {
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 4.2rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            margin: 0; 
            position: relative;
            z-index: 1;
            line-height: 1.1;
        }

        .welcome-text {
            color: #1e293b; 
            margin-right: 20px; 
            font-weight: 800; 
            font-size: 3.5rem;
        }

        /* Logo Renkleri ve DropShadow */
        .cyp { color: #D4A373; filter: drop-shadow(0 0 2px rgba(212, 163, 115, 0.3)); }
        .inv { color: #1E88E5; filter: drop-shadow(0 0 2px rgba(30, 136, 229, 0.3)); }
        .est { color: #2E7D32; filter: drop-shadow(0 0 2px rgba(46, 125, 50, 0.3)); }

        .dot {
            width: 15px; 
            height: 15px; 
            background: #D4A373; 
            border-radius: 50%; 
            margin-left: 10px; 
            margin-top: 30px; 
            box-shadow: 0 0 10px rgba(212, 163, 115, 0.6);
        }

        .choose-text { 
            font-weight: 600; 
            margin: 40px 0 30px 0; 
            color: #64748b; 
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        /* Buton Grubu */
        .btn-group { 
            display: flex; 
            gap: 20px; 
            position: relative;
            z-index: 1;
        }

        .btn { 
            padding: 16px 45px; 
            border-radius: 15px; 
            border: none; 
            color: white; 
            font-weight: 700; 
            text-decoration: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-user { background: #3b82f6; }   
        .btn-agent { background: #FB8500; }  
        .btn-admin { background: #A4161A; }  

        .btn:hover { 
            transform: translateY(-8px) scale(1.05); 
            filter: brightness(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* Alt Slogan */
        .slogan {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

    </style>
</head>
<body>
    <div class="glass-container">
        <div class="glass-box">
            
            <h1 class="welcome-title">
                <span class="welcome-text">Welcome to</span>
                <span class="cyp">Cyp</span><span class="inv">Inv</span><span class="est">Est</span>
                <span class="dot"></span>
            </h1>
            
            <p class="choose-text">Choose Your Role</p>
            
            <div class="btn-group">
                <a href="/login/user" class="btn btn-user">User Portal</a>
                <a href="/login/agent" class="btn btn-agent">Agent Space</a>
                <a href="/login/admin" class="btn btn-admin">Management</a>
            </div>

            <p class="slogan">AI-Powered Real Estate Ecosystem of Cyprus</p>
        </div>
    </div>
</body>
</html>
