<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - CypInvEst</title>
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        
        /* Arka Plan Konfigürasyonu */
        .glass-container {
            height: 100vh; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url("/static/htmlfotos/loginspage.png") no-repeat center center fixed;
            background-size: cover;
        }

        /* İstediğin 579x384 Kutu ve %98 Opaklık */
        .glass-box {
            width: 579px; 
            height: 384px; 
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 32px; margin-bottom: 5px; color: #333; }
        
        .choose-text { 
            font-weight: 600; 
            margin-bottom: 40px; 
            color: #000; 
            font-size: 18px;
        }

        /* Buton Grubu ve Renk Paleti */
        .btn-group { display: flex; gap: 15px; }

        .btn { 
            padding: 12px 30px; 
            border-radius: 12px; 
            border: none; 
            color: white; 
            font-weight: 600; 
            text-decoration: none; 
            transition: 0.3s; 
            font-size: 14px; 
        }

        /* Backend rotalarıyla tam uyumlu ( /login/{role} ) */
        .btn-user { background: #3b82f6; }   /* Mavi */
        .btn-agent { background: #FB8500; }  /* Turuncu */
        .btn-admin { background: #A4161A; }  /* Koyu Kırmızı */

        .btn:hover { 
            transform: translateY(-3px); 
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="glass-box">
            <h1>Welcome to</h1>
            <h1 style="color: #3b82f6; margin-bottom: 30px;">CypInvEst</h1>
            
            <p class="choose-text">Choose Role</p>
            
            <div class="btn-group">
                <a href="/login/user" class="btn btn-user">User</a>
                <a href="/login/agent" class="btn btn-agent">Agent</a>
                <a href="/login/admin" class="btn btn-admin">Admin</a>
            </div>
        </div>
    </div>
</body>
</html>
