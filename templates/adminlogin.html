<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - CypInvEst</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .glass-container {
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(164, 22, 26, 0.2), rgba(164, 22, 26, 0.2)), url("/static/htmlfotos/loginspage.png") no-repeat center center fixed;
            background-size: cover;
        }
        .glass-box {
            width: 579px; height: 384px; background: rgba(255, 255, 255, 0.98);
            border-radius: 16px; position: relative; padding: 40px;
            box-shadow: 0 0 40px rgba(164, 22, 26, 0.5);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .exit-btn { position: absolute; top: 20px; right: 25px; text-decoration: none; font-size: 20px; }
        h2 { margin-bottom: 15px; }
        .input-group { width: 100%; margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .btn-full { width: 100%; padding: 12px; background: #A4161A; color: white; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; }
        .error { color: #A4161A; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="glass-box">
            <a href="/" class="exit-btn">🚪</a>
            <h2>Admin Login</h2>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form action="/login/admin" method="POST" style="width: 100%;">
                <div class="input-group"><label>Enter Mail</label><input type="email" name="email" required></div>
                <div class="input-group"><label>Enter Password</label><input type="password" name="password" required></div>
                <button type="submit" class="btn-full">ADMIN ACCESS</button>
            </form>
        </div>
    </div>
</body>
</html>
