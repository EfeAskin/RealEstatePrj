<!DOCTYPE html>
<html>
<head>
    <title>AgentRegister - CypInvEst</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .glass-container {
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(255, 153, 0, 0.151), rgba(255, 153, 0, 0.151)), url("/static/htmlfotos/loginspage.png") no-repeat center center fixed;
            background-size: cover;
        }
        .glass-box {
            width: 579px; height: 680px; background: rgba(255, 255, 255, 0.98); border-radius: 16px;
            box-shadow: 0 0 30px #FB8500; padding: 30px 50px; text-align: center;
        }
        .input-group { text-align: left; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 3px; color: #667; }
        .input-group input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fcfcfc; }
        .btn-create { width: 100%; padding: 12px; background: #FB8500; color: white; border: none; border-radius: 20px; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .error { color: red; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="glass-box">
            <h2 style="margin-bottom: 20px;">Create Account</h2>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form action="/register/agent" method="POST">
                <div class="input-group"><label>First Name</label><input type="text" name="first_name" placeholder="e.g. Efe" required></div>
                <div class="input-group"><label>Last Name</label><input type="text" name="last_name" placeholder="e.g. Askin" required></div>
                <div class="input-group"><label>ID</label><input type="text" name="user_id" placeholder="e.g. 34321" required></div>
                <div class="input-group"><label>Email</label><input type="email" name="email" placeholder="example@gmail.com" required></div>
                <div class="input-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
                <div class="input-group"><label>Confirm Password</label><input type="password" name="confirm_password" placeholder="••••••••" required></div>
                <button type="submit" class="btn-create">✓ CREATE ACCOUNT</button>
            </form>
            <p style="margin-top: 15px; font-size: 12px;">Already have an account? <a href="/login/agent" style="color: #FB8500; text-decoration: none;">Login</a></p>
        </div>
    </div>
</body>
</html>
