<!DOCTYPE html>
<html>
<head>
    <title>Agent Register - CypInvEst</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body, html { width: 100%; height: 100%; overflow: hidden; }

        .glass-container {
            height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(251, 133, 0, 0.12), rgba(251, 133, 0, 0.12)), 
                        url("/static/htmlfotos/loginspage.png") no-repeat center center fixed;
            background-size: cover;
        }

        .glass-box {
            width: 520px; 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; 
            position: relative; 
            padding: 40px 50px;
            box-shadow: 0 0 40px rgba(251, 133, 0, 0.2), 0 20px 50px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Geri Dönüş */
        .exit-btn { 
            position: absolute; top: 20px; right: 20px; 
            text-decoration: none; width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; 
            background: #f1f5f9; color: #64748b; border-radius: 50%; 
            transition: 0.3s ease; font-size: 1rem;
        }
        .exit-btn:hover { background: #fff7ed; color: #fb8500; transform: scale(1.1); }

        /* Logo */
        .brand-logo {
            font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px;
            display: flex; align-items: center;
        }
        h2 { font-size: 1.1rem; color: #64748b; margin-bottom: 25px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

        /* Form Düzeni (Grid benzeri çiftli görünüm için) */
        form { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        .input-group { text-align: left; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #1e293b; }
        
        .input-group input { 
            width: 100%; padding: 12px 15px; border-radius: 12px; 
            border: 1.5px solid #e2e8f0; outline: none; font-size: 13px;
            transition: 0.3s; background: white;
        }
        .input-group input:focus { 
            border-color: #fb8500; 
            box-shadow: 0 0 0 4px rgba(251, 133, 0, 0.1); 
        }

        .btn-create { 
            grid-column: span 2; padding: 14px; background: #fb8500; color: white; 
            border: none; border-radius: 15px; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(251, 133, 0, 0.3);
        }
        .btn-create:hover { 
            background: #e67a00; transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(251, 133, 0, 0.4);
        }

        .error { 
            grid-column: span 2; background: #fff1f2; color: #e11d48; 
            padding: 10px; border-radius: 10px; font-size: 12px; 
            margin-bottom: 15px; text-align: center; border: 1px solid #ffe4e6;
        }

        .login-link { grid-column: span 2; margin-top: 20px; font-size: 13px; color: #64748b; text-align: center; }
        .login-link a { color: #fb8500; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="glass-box">
            <a href="/" class="exit-btn" title="Back to Welcome">
                <i class="fas fa-arrow-left"></i>
            </a>

            <div class="brand-logo">
                <span style="color: #D4A373;">Cyp</span><span style="color: #1E88E5;">Inv</span><span style="color: #2E7D32;">Est</span>
                <span style="width: 7px; height: 7px; background: #D4A373; border-radius: 50%; margin-left: 4px; margin-top: 10px;"></span>
            </div>
            <h2>Partner Registration</h2>

            {% if error %}<div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>{% endif %}

            <form action="/register/agent" method="POST">
                <div class="input-group">
                    <label>First Name*</label>
                    <input type="text" name="first_name" placeholder="John" required>
                </div>
                <div class="input-group">
                    <label>Last Name*</label>
                    <input type="text" name="last_name" placeholder="Doe" required>
                </div>
                <div class="input-group">
                    <label>ID*</label>
                    <input type="text" name="user_id" placeholder="Licence No" required>
                </div>
                <div class="input-group">
                    <label>Phone Number*</label>
                    <input type="text" name="phone" placeholder="123-456-7890" required>
                </div>
                <div class="input-group">
                    <label>Email*</label>
                    <input type="email" name="email" placeholder="john@agency.com" required>
                </div>
                <div class="input-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="Agency Name" required>
                </div>
                <div class="input-group full-width">
                    <label>Password*</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="input-group full-width">
                    <label>Confirm Password*</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-create">✓ REGISTER AS AGENT</button>
            </form>

            <p class="login-link">Already a partner? <a href="/login/agent">Sign In</a></p>
        </div>
    </div>
</body>
</html>
